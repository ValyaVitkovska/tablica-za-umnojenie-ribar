<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Риболов с Умножение</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB; /* Небесно синьо */
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #sky {
            height: 25%;
            background: linear-gradient(to bottom, #4fc3f7, #b3e5fc);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .sun {
            position: absolute;
            top: 20px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: #FFEB3B;
            border-radius: 50%;
            box-shadow: 0 0 40px #FFEB3B, 0 0 80px #FFEB3B;
            animation: pulseSun 4s infinite alternate;
        }

        @keyframes pulseSun {
            0% { transform: scale(1); box-shadow: 0 0 40px #FFEB3B; }
            100% { transform: scale(1.1); box-shadow: 0 0 60px #FFC107; }
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: floatCloud linear infinite;
        }
        
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        /* Облак 1 */
        .cloud-1 { top: 30px; left: -150px; width: 120px; height: 40px; animation-duration: 40s; }
        .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud-1::after { width: 50px; height: 50px; top: -20px; right: 15px; }

        /* Облак 2 */
        .cloud-2 { top: 60px; left: -200px; width: 100px; height: 35px; animation-duration: 55s; animation-delay: 15s; opacity: 0.6; transform: scale(0.8); }
        .cloud-2::before { width: 50px; height: 50px; top: -25px; left: 10px; }
        .cloud-2::after { width: 40px; height: 40px; top: -15px; right: 10px; }

        @keyframes floatCloud {
            from { transform: translateX(0); }
            to { transform: translateX(120vw); }
        }

        #land {
            height: 25%;
            background: linear-gradient(to bottom, #81C784, #4CAF50);
            position: relative;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            border-top-left-radius: 50% 10px;
            border-top-right-radius: 50% 10px;
            box-shadow: inset 0 15px 20px rgba(255,255,255,0.2);
        }

        #bank {
            position: absolute;
            bottom: -15px;
            left: 0;
            width: 100%;
            height: 30px;
            background: linear-gradient(to bottom, #D7CCC8, #A1887F);
            border-radius: 10px;
            z-index: 11;
        }

        /* Декорации по брега */
        .landscape-deco {
            position: absolute;
            pointer-events: none;
        }

        .bush {
            background: #2E7D32;
            border-radius: 50% 50% 0 0;
            bottom: 10px;
        }

        .flower {
            font-size: 1.5rem;
            bottom: 15px;
        }

        #water-container {
            height: 50%;
            position: relative;
            z-index: 5;
        }

        /* Същинските вълни чрез SVG Background */
        .wave-layer {
            position: absolute;
            left: 0;
            width: 200%;
            height: 50px;
            background-repeat: repeat-x;
            background-size: 1000px 50px;
            z-index: 12;
        }

        #wave1 {
            top: -25px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 50' preserveAspectRatio='none'><path d='M0,25 C150,50 350,0 500,25 C650,50 850,0 1000,25 L1000,50 L0,50 Z' fill='%234FC3F7' opacity='0.8'/></svg>");
            animation: moveWaves 6s linear infinite;
        }

        #wave2 {
            top: -15px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 50' preserveAspectRatio='none'><path d='M0,25 C200,0 300,50 500,25 C700,0 800,50 1000,25 L1000,50 L0,50 Z' fill='%230288D1' opacity='0.6'/></svg>");
            animation: moveWaves 4s linear infinite reverse;
        }

        #water {
            height: 100%;
            background: linear-gradient(to bottom, #0288D1, #01579B);
            position: relative;
            overflow: hidden;
        }

        @keyframes moveWaves {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        #question-board {
            background-color: #FFEB3B;
            border: 4px solid #795548;
            border-radius: 12px;
            padding: 10px 40px;
            font-size: 2.5rem;
            font-weight: 900;
            color: #3E2723;
            box-shadow: 0 8px 0px #5D4037, 0 15px 20px rgba(0,0,0,0.4);
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 200px;
            text-align: center;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        #fisherman {
            position: absolute;
            bottom: 14px;
            right: 25%;
            width: 78px;
            height: 124px;
            z-index: 15;
            transition: transform 0.2s, filter 0.2s;
            filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.4));
            transform-origin: bottom center;
            pointer-events: none;
        }

        .fisherman-figure {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .fisher-hat-brim {
            position: absolute;
            top: 8%;
            left: 50%;
            width: 58%;
            height: 6%;
            transform: translateX(-50%);
            background: #6D4C41;
            border-radius: 999px;
            z-index: 5;
        }

        .fisher-hat-top {
            position: absolute;
            top: 2%;
            left: 50%;
            width: 38%;
            height: 12%;
            transform: translateX(-50%);
            background: #795548;
            border-radius: 50% 50% 12% 12%;
            z-index: 4;
        }

        .fisher-head {
            position: absolute;
            top: 10%;
            left: 50%;
            width: 36%;
            aspect-ratio: 1;
            transform: translateX(-50%);
            background: #F4C19C;
            border: 2px solid rgba(93, 64, 55, 0.35);
            border-radius: 50%;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.86rem;
            line-height: 1;
        }

        .fisher-neck {
            position: absolute;
            top: 33%;
            left: 50%;
            width: 13%;
            height: 10%;
            transform: translateX(-50%);
            background: #E0A77F;
            border-radius: 30%;
            z-index: 1;
        }

        .fisher-body {
            position: absolute;
            top: 39%;
            left: 50%;
            width: 44%;
            height: 32%;
            transform: translateX(-50%);
            background: linear-gradient(to bottom, #2E7D32, #1B5E20);
            border: 2px solid rgba(0,0,0,0.18);
            border-radius: 30% 30% 18% 18%;
            z-index: 2;
        }

        .fisher-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 18%;
            height: 100%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.78);
        }

        .fisher-body::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 8%;
            right: 8%;
            height: 22%;
            border-top: 2px solid rgba(255,255,255,0.6);
            border-bottom: 2px solid rgba(255,255,255,0.35);
        }

        .fisher-arm {
            position: absolute;
            top: 43%;
            width: 11%;
            height: 31%;
            background: #E0A77F;
            border-radius: 999px;
            transform-origin: top center;
            z-index: 1;
        }

        .fisher-arm-left {
            left: 25%;
            transform: rotate(18deg);
        }

        .fisher-arm-right {
            right: 25%;
            transform: rotate(-35deg);
        }

        .fisher-leg {
            position: absolute;
            top: 68%;
            width: 12%;
            height: 26%;
            background: #263238;
            border-radius: 999px;
            transform-origin: top center;
            z-index: 1;
        }

        .fisher-leg-left {
            left: 38%;
            transform: rotate(7deg);
        }

        .fisher-leg-right {
            right: 38%;
            transform: rotate(-7deg);
        }

        .fisher-boot {
            position: absolute;
            bottom: 0;
            width: 21%;
            height: 7%;
            background: #3E2723;
            border-radius: 999px;
            z-index: 2;
        }

        .fisher-boot-left { left: 29%; }
        .fisher-boot-right { right: 29%; }

        .fisher-face {
            display: inline-flex;
            transform: translateY(1px);
        }

        /* Анимации за реакциите на рибаря */
        .anim-idle { animation: breathe 3s infinite ease-in-out; }
        
        .anim-happy { 
            animation: jumpHappy 0.6s ease-in-out; 
            filter: drop-shadow(0 0 20px #4CAF50);
        }
        
        .anim-sad { 
            animation: shakeSad 0.5s ease-in-out; 
            filter: drop-shadow(0 0 20px #F44336);
        }

        @keyframes breathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.03) translateY(-2px); }
        }

        @keyframes jumpHappy {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.1); }
        }

        @keyframes shakeSad {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-10deg); }
            75% { transform: translateX(15px) rotate(10deg); }
        }

        .fishing-rod {
            position: absolute;
            width: 6px;
            height: 140px;
            background: linear-gradient(to right, #8D6E63, #5D4037);
            bottom: 50px;
            right: calc(25% + 50px);
            transform-origin: bottom right;
            transform: rotate(45deg);
            z-index: 14;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 3px;
        }

        .fishing-rod.catching { transform: rotate(15deg); }

        .fishing-line {
            position: absolute;
            width: 1px;
            height: 180px;
            background-color: rgba(255,255,255,0.8);
            top: -180px;
            right: 0;
            z-index: 14;
            box-shadow: 0 0 2px rgba(255,255,255,0.5);
        }

        .fishing-bobber {
            position: absolute;
            top: -185px;
            right: -4px;
            width: 8px;
            height: 12px;
            background: red;
            border-radius: 4px;
            border-bottom: 6px solid white;
        }

        .fish {
            position: absolute;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 60px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
            animation: swim linear infinite;
        }

        .fish:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5)) brightness(1.1);
        }

        .fish-body {
            font-size: 4.5rem;
            position: absolute;
            z-index: 1;
        }
        
        .fish-value {
            position: absolute;
            z-index: 2;
            font-weight: 900;
            font-size: 1.3rem;
            color: #fff;
            white-space: nowrap;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0px 4px 5px rgba(0,0,0,0.8);
            pointer-events: none;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .fish.swimming-right .fish-body { transform: scaleX(-1); }
        .fish.swimming-left .fish-value { left: -20px; right: auto; }
        .fish.swimming-right .fish-value { right: -20px; left: auto; }

        @keyframes swim {
            from { transform: translateX(0) translateY(0); }
            to { transform: translateX(calc(100vw + 200px)) translateY(0); }
        }

        /* UI Stats */
        #stats-board {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(255,255,255,0.95);
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            z-index: 40;
            color: #333;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border: 3px solid #E0F7FA;
        }

        .stat-item { display: flex; justify-content: space-between; align-items: center; min-width: 140px; }
        .stat-item span { display: inline-block; transition: transform 0.2s, color 0.2s; font-size: 1.4rem; }

        #controls {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .btn {
            background: linear-gradient(to bottom, #4DD0E1, #00ACC1);
            border: 2px solid #00838F;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .btn:hover { background: linear-gradient(to bottom, #26C6DA, #0097A7); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); }

        #speed-selector {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            background-color: rgba(255,255,255,0.95);
            padding: 6px 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid #E0F7FA;
        }

        .speed-btn {
            background: linear-gradient(to bottom, #FFFFFF, #E0F7FA);
            border: 2px solid #00838F;
            color: #00636E;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .speed-btn:hover { background: linear-gradient(to bottom, #B2EBF2, #80DEEA); }

        .speed-btn.active {
            background: linear-gradient(to bottom, #4DD0E1, #00838F);
            color: white;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* End Game Overlay */
        #message-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #message-box {
            background: white; padding: 40px 60px; border-radius: 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid #00ACC1;
        }
        #message-overlay.active { opacity: 1; pointer-events: auto; }
        #message-overlay.active #message-box { transform: scale(1); }

        /* Авторско лого и надпис — компактна долна лента, без да покрива играта */
        #water-container {
            flex: 1 1 auto;
            height: auto;
            min-height: 0;
        }

        #author-footer {
            position: relative;
            z-index: 30;
            flex: 0 0 auto;
            min-height: 32px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 4px 14px;
            background: rgba(225, 247, 252, 0.92);
            border-top: 1px solid rgba(0, 172, 193, 0.55);
            box-shadow: 0 -3px 10px rgba(0,0,0,0.16);
            color: #064E5A;
            font-weight: 700;
            font-size: clamp(0.6rem, 0.85vw, 0.75rem);
            line-height: 1.25;
            text-align: center;
            pointer-events: none;
            white-space: normal;
            overflow: hidden;
            box-sizing: border-box;
        }

        #author-footer .footer-credit {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-width: min(96vw, 900px);
        }

        #author-footer img {
            height: 22px;
            width: 22px;
            object-fit: contain;
            flex: 0 0 auto;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.22));
        }

        #author-footer span {
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 720px) {
            #author-footer {
                flex-basis: auto;
                min-height: 28px;
                padding: 3px 8px;
                gap: 5px;
                font-size: 0.62rem;
            }

            #author-footer img {
                height: 18px;
                width: 18px;
            }
        }


        /* Responsive layout: phone, tablet, laptop */
        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            width: 100%;
            min-height: 100%;
            overscroll-behavior: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            height: 100vh;
            height: 100svh;
            height: 100dvh;
            max-height: 100dvh;
            overflow: hidden;
        }

        #sky {
            flex: 0 0 clamp(78px, 22dvh, 190px);
            height: auto;
        }

        #land {
            flex: 0 0 clamp(112px, 25dvh, 210px);
            height: auto;
            min-height: 112px;
        }

        #water-container {
            flex: 1 1 auto;
            min-height: 150px;
        }

        #water { touch-action: none; }

        #question-board {
            max-width: min(52vw, 440px);
            min-width: clamp(132px, 26vw, 230px);
            padding: clamp(6px, 1.1vw, 12px) clamp(14px, 3vw, 40px);
            font-size: clamp(1.55rem, 4.2vw, 2.7rem);
            border-width: clamp(2px, 0.55vw, 4px);
            top: clamp(8px, 2dvh, 20px);
        }

        #stats-board {
            max-width: min(38vw, 250px);
            padding: clamp(6px, 1.1vw, 12px) clamp(8px, 1.5vw, 20px);
            font-size: clamp(0.72rem, 1.45vw, 1.1rem);
            gap: clamp(2px, 0.55vw, 5px);
        }

        .stat-item { min-width: clamp(96px, 17vw, 140px); }
        .stat-item span { font-size: clamp(0.95rem, 2.2vw, 1.4rem); }

        #controls { max-width: 42vw; }

        .btn {
            min-height: 44px;
            min-width: 44px;
            padding: clamp(7px, 1.2vw, 12px) clamp(10px, 2vw, 22px);
            font-size: clamp(0.78rem, 1.7vw, 1.1rem);
            touch-action: manipulation;
        }

        #speed-selector {
            padding: clamp(4px, 0.8vw, 6px) clamp(5px, 1vw, 8px);
            gap: clamp(3px, 0.7vw, 6px);
        }

        .speed-btn {
            min-height: 34px;
            padding: clamp(4px, 0.8vw, 6px) clamp(7px, 1.4vw, 12px);
            font-size: clamp(0.62rem, 1.3vw, 0.85rem);
        }

        #fisherman {
            width: clamp(54px, 8.2vw, 82px);
            height: clamp(86px, 15.5dvh, 128px);
            right: clamp(12%, 24vw, 27%);
            bottom: clamp(5px, 1.8dvh, 16px);
        }

        .fisher-head { font-size: clamp(0.62rem, 1.25vw, 0.9rem); }

        .fishing-rod {
            width: clamp(4px, 0.6vw, 6px);
            height: clamp(88px, 16dvh, 140px);
            right: calc(clamp(12%, 24vw, 27%) + clamp(34px, 6.4vw, 58px));
            bottom: clamp(34px, 7dvh, 55px);
        }

        .fishing-line {
            height: clamp(108px, 20dvh, 180px);
            top: calc(-1 * clamp(108px, 20dvh, 180px));
        }

        .fishing-bobber {
            top: calc(-1 * clamp(112px, 20.6dvh, 185px));
        }

        .fish {
            width: clamp(92px, 16vw, 132px);
            height: clamp(58px, 9vw, 78px);
            touch-action: none;
        }

        .fish-body { font-size: clamp(3.75rem, 8vw, 5.1rem); }

        .fish-value {
            font-size: clamp(1.08rem, 2.7vw, 1.45rem);
            padding: clamp(2px, 0.5vw, 4px) clamp(7px, 1.2vw, 10px);
            border-radius: 999px;
        }

        .sun {
            width: clamp(42px, 8vw, 80px);
            height: clamp(42px, 8vw, 80px);
            top: clamp(8px, 2dvh, 20px);
            right: clamp(14px, 5vw, 50px);
        }

        .cloud-1, .cloud-2 { transform-origin: center; }

        #message-overlay {
            padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
        }

        #message-box {
            width: min(92vw, 560px);
            max-height: 88dvh;
            overflow: auto;
            padding: clamp(22px, 4vw, 40px) clamp(18px, 5vw, 60px);
        }

        #message-title { font-size: clamp(1.8rem, 5vw, 2.5rem) !important; }
        #message-text { font-size: clamp(1.15rem, 3.6vw, 1.5rem) !important; }
        #message-box .btn { font-size: clamp(1rem, 3.2vw, 1.3rem) !important; }

        @media (max-width: 900px) {
            .landscape-deco.bush { opacity: 0.82; transform: scale(0.78); transform-origin: bottom center; }
            .flower { font-size: 1.15rem; }
        }

        @media (max-width: 640px) {
            #stats-board {
                top: max(8px, env(safe-area-inset-top));
                left: max(8px, env(safe-area-inset-left));
                max-width: 142px;
                padding: 6px 8px;
                border-width: 2px;
                border-radius: 12px;
            }

            #controls {
                top: max(8px, env(safe-area-inset-top));
                right: max(8px, env(safe-area-inset-right));
            }

            .btn {
                border-radius: 9px;
                line-height: 1.05;
            }

            #question-board {
                max-width: min(58vw, 240px);
                min-width: 120px;
            }

            #sky { flex-basis: clamp(70px, 19dvh, 120px); }
            #land { flex-basis: clamp(105px, 23dvh, 145px); }
            #water-container { min-height: 180px; }

            #fisherman {
                width: clamp(44px, 13vw, 60px);
                height: clamp(70px, 18dvh, 96px);
                bottom: 4px;
                right: clamp(10%, 22vw, 28%);
            }

            .fisher-head { font-size: clamp(0.5rem, 2.2vw, 0.68rem); }

            .wave-layer { height: 38px; background-size: 760px 38px; }
            #wave1 { top: -19px; }
            #wave2 { top: -12px; }

            .fish:hover { transform: none; }
            .fish.swimming-left .fish-value { left: -12px; }
            .fish.swimming-right .fish-value { right: -12px; }

            #author-footer {
                padding-left: max(6px, env(safe-area-inset-left));
                padding-right: max(6px, env(safe-area-inset-right));
            }
        }

        @media (max-width: 420px) {
            #stats-board { max-width: 126px; }
            .stat-item { min-width: 104px; }
            #controls { max-width: 112px; }
            .btn { padding-left: 8px; padding-right: 8px; }
            #speed-selector { flex-wrap: wrap; }
            .speed-btn { padding: 4px 6px; font-size: 0.6rem; min-height: 28px; }
            #question-board { top: 6px; }
            .sun, .cloud-2, .landscape-deco:nth-of-type(2), .landscape-deco:nth-of-type(6) { display: none; }
        }

        @media (max-height: 520px) and (orientation: landscape) {
            #sky { flex-basis: 60px; }
            #land { flex-basis: 92px; min-height: 92px; }
            #water-container { min-height: 120px; }
            #question-board { font-size: clamp(1.35rem, 4.6dvh, 2.05rem); top: 5px; }
            #fisherman { width: clamp(38px, 10dvh, 52px); height: clamp(58px, 18dvh, 78px); bottom: 3px; }
            .fishing-rod { height: 76px; bottom: 28px; }
            .fishing-line { height: 86px; top: -86px; }
            .fishing-bobber { top: -91px; }
            .fish { width: 92px; height: 54px; }
            .fish-body { font-size: 3.4rem; }
            .fish-value { font-size: 1rem; }
            #stats-board { padding: 5px 8px; gap: 1px; }
            .stat-item span { font-size: 0.95rem; }
            .btn { min-height: 38px; }
            #author-footer { flex-basis: auto; min-height: 24px; font-size: 0.56rem; padding: 2px 6px; }
            #author-footer img { width: 16px; height: 16px; }
        }

        @media (min-width: 1000px) {
            #stats-board { max-width: 280px; }
            #question-board { max-width: 520px; }
        }

    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="stats-board">
            <div class="stat-item text-blue-700"><span class="text-base uppercase">Време:</span> <span id="timer">180</span></div>
            <div class="stat-item"><span class="text-base uppercase">Точки:</span> <span id="score">0</span></div>
            <div class="stat-item text-green-600"><span class="text-base uppercase">Верни:</span> <span id="correct-count">0</span></div>
            <div class="stat-item text-red-600"><span class="text-base uppercase">Грешни:</span> <span id="incorrect-count">0</span></div>
        </div>
        
        <div id="controls">
            <button class="btn" onclick="resetGame()">Нова Игра</button>
            <button class="btn" id="install-btn" onclick="installApp()" style="display:none;">📲 Инсталирай</button>
            <div id="speed-selector" role="group" aria-label="Скорост на рибите">
                <button class="speed-btn" id="speed-slow" onclick="setSpeed('slow')">Бавно</button>
                <button class="speed-btn" id="speed-normal" onclick="setSpeed('normal')">Средно</button>
                <button class="speed-btn" id="speed-fast" onclick="setSpeed('fast')">Бързо</button>
            </div>
        </div>

        <div id="sky">
            <div class="sun"></div>
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
        </div>

        <div id="land">
            <!-- Декорации по брега -->
            <div class="landscape-deco bush" style="left: 5%; width: 80px; height: 50px;"></div>
            <div class="landscape-deco bush" style="left: 15%; width: 60px; height: 40px; background: #1B5E20;"></div>
            <div class="landscape-deco bush" style="right: 10%; width: 100px; height: 60px;"></div>
            <div class="landscape-deco flower" style="left: 25%;">🌻</div>
            <div class="landscape-deco flower" style="left: 45%;">🌷</div>
            <div class="landscape-deco flower" style="right: 35%;">🌼</div>
            <div class="landscape-deco flower" style="right: 5%;">🍄</div>
            
            <div id="question-board">
                <span id="current-question">...</span>
            </div>
            
            <div class="fishing-rod" id="rod">
                <div class="fishing-line"></div>
                <div class="fishing-bobber"></div>
            </div>
            
            <!-- Рибарят -->
            <div id="fisherman" class="anim-idle" aria-label="Рибар">
                <div class="fisherman-figure" aria-hidden="true">
                    <div class="fisher-hat-top"></div>
                    <div class="fisher-hat-brim"></div>
                    <div class="fisher-head"><span class="fisher-face">🙂</span></div>
                    <div class="fisher-neck"></div>
                    <div class="fisher-body"></div>
                    <div class="fisher-arm fisher-arm-left"></div>
                    <div class="fisher-arm fisher-arm-right"></div>
                    <div class="fisher-leg fisher-leg-left"></div>
                    <div class="fisher-leg fisher-leg-right"></div>
                    <div class="fisher-boot fisher-boot-left"></div>
                    <div class="fisher-boot fisher-boot-right"></div>
                </div>
            </div>
            
            <div id="bank"></div>
        </div>

        <div id="water-container">
            <div id="wave1" class="wave-layer"></div>
            <div id="wave2" class="wave-layer"></div>
            <div id="water">
                <!-- Рибите се генерират тук -->
            </div>
        </div>

    <script>
        const fishEmojis = ['🐟', '🐠', '🐡', '🦈', '🐬'];
        const fishermanEl = document.getElementById('fisherman');
        const fishermanFaceEl = fishermanEl.querySelector('.fisher-face');
        const rodEl = document.getElementById('rod');

        let currentCorrectAnswers = [];
        let currentMode = '';
        let score = 0;
        let correctAnswers = 0;
        let incorrectAnswers = 0;
        let timeLeft = 180;
        let gameTimerInterval;
        let isGameOver = false;

        let spawnInterval;
        let maxFishesOnScreen = 8;
        let fishSpeedConfig = { minDuration: 8, maxDuration: 22, spawnDelay: 1500 };
        let resizeTimer;

        // Скорост на рибите: по-малък коефициент = по-бързи риби
        const SPEED_LEVELS = { slow: 1.4, normal: 1.0, fast: 0.62 };
        let currentSpeedKey = localStorage.getItem('ribolov-speed') || 'normal';
        if (!SPEED_LEVELS[currentSpeedKey]) currentSpeedKey = 'normal';
        let speedMultiplier = SPEED_LEVELS[currentSpeedKey];

        // Инсталиране като приложение (PWA)
        let deferredInstallPrompt = null;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        window.addEventListener('beforeinstallprompt', (event) => {
            event.preventDefault();
            deferredInstallPrompt = event;
            if (!isStandalone) {
                const btn = document.getElementById('install-btn');
                if (btn) btn.style.display = 'inline-flex';
            }
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            const btn = document.getElementById('install-btn');
            if (btn) btn.style.display = 'none';
        });

        window.installApp = async function() {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
            const btn = document.getElementById('install-btn');
            if (btn) btn.style.display = 'none';
        };
        const waterElement = document.getElementById('water');
        const questionElement = document.getElementById('current-question');
        const scoreElement = document.getElementById('score');
        
        let reactionTimeout;


        function getResponsiveGameConfig() {
            const width = window.innerWidth || document.documentElement.clientWidth;
            const height = window.innerHeight || document.documentElement.clientHeight;
            const isCompactPhone = width <= 480 || height <= 520;
            const isTabletOrSmallLaptop = width <= 1024;

            let base;
            if (isCompactPhone) {
                base = { maxFishes: 5, minDuration: 10, maxDuration: 18, spawnDelay: 1850 };
            } else if (isTabletOrSmallLaptop) {
                base = { maxFishes: 6, minDuration: 9, maxDuration: 17, spawnDelay: 1650 };
            } else {
                base = { maxFishes: 8, minDuration: 8, maxDuration: 22, spawnDelay: 1500 };
            }

            return {
                maxFishes: base.maxFishes,
                minDuration: base.minDuration * speedMultiplier,
                maxDuration: base.maxDuration * speedMultiplier,
                spawnDelay: Math.round(base.spawnDelay * speedMultiplier)
            };
        }

        function setSpeed(level) {
            if (!SPEED_LEVELS[level]) return;
            currentSpeedKey = level;
            speedMultiplier = SPEED_LEVELS[level];
            try { localStorage.setItem('ribolov-speed', level); } catch (e) { /* игнорирай, ако няма достъп */ }
            updateSpeedButtons();
            applyResponsiveGameSettings();
            restartSpawnInterval();
        }

        function updateSpeedButtons() {
            ['slow', 'normal', 'fast'].forEach((key) => {
                const btn = document.getElementById('speed-' + key);
                if (btn) btn.classList.toggle('active', key === currentSpeedKey);
            });
        }

        function applyResponsiveGameSettings() {
            fishSpeedConfig = getResponsiveGameConfig();
            maxFishesOnScreen = fishSpeedConfig.maxFishes;

            while (waterElement.children.length > maxFishesOnScreen) {
                waterElement.removeChild(waterElement.lastElementChild);
            }
        }

        function restartSpawnInterval() {
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(checkAndSpawnFishes, fishSpeedConfig.spawnDelay);
        }

        function initGame() {
            updateSpeedButtons();
            applyResponsiveGameSettings();
            score = 0;
            correctAnswers = 0;
            incorrectAnswers = 0;
            timeLeft = 180;
            isGameOver = false;
            
            updateScore(0);
            updateStats();
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('timer').style.color = '';
            
            waterElement.innerHTML = '';
            generateNewQuestion();
            spawnInitialFishes();
            closeMessage();
            resetFisherman();
            
            restartSpawnInterval(); // Интервалът се адаптира според устройството

            if (gameTimerInterval) clearInterval(gameTimerInterval);
            gameTimerInterval = setInterval(updateGameTimer, 1000);
        }

        // Функция за реакциите на рибаря
        function reactFisherman(type) {
            clearTimeout(reactionTimeout);
            fishermanEl.className = ''; // Изчистваме старите класове
            
            if (type === 'happy') {
                if (fishermanFaceEl) fishermanFaceEl.textContent = '😄';
                fishermanEl.classList.add('anim-happy');
            } else if (type === 'sad') {
                if (fishermanFaceEl) fishermanFaceEl.textContent = '😟';
                fishermanEl.classList.add('anim-sad');
            }

            // Връщане към нормално състояние след кратка пауза
            reactionTimeout = setTimeout(() => {
                resetFisherman();
            }, 1000);
        }

        function resetFisherman() {
            if (fishermanFaceEl) fishermanFaceEl.textContent = '🙂';
            fishermanEl.className = 'anim-idle';
        }

        function updateGameTimer() {
            if (isGameOver) return;
            timeLeft--;
            const timerEl = document.getElementById('timer');
            timerEl.innerText = timeLeft;
            
            if (timeLeft <= 10) timerEl.style.color = '#F44336';

            if (timeLeft <= 0) endGame();
        }

        function endGame() {
            isGameOver = true;
            clearInterval(spawnInterval);
            clearInterval(gameTimerInterval);
            waterElement.innerHTML = '';
            resetFisherman();
            
            const statsHtml = `
                <span>🏆 Общо Точки: <b class="text-blue-600">${score}</b></span>
                <span>✅ Верни улови: <b class="text-green-600">${correctAnswers}</b></span>
                <span>❌ Изпуснати риби: <b class="text-red-600">${incorrectAnswers}</b></span>
            `;
            showMessage("Край на риболова!", statsHtml);
        }

        function updateStats() {
            document.getElementById('correct-count').innerText = correctAnswers;
            document.getElementById('incorrect-count').innerText = incorrectAnswers;
        }

        function generateNewQuestion() {
            const a = Math.floor(Math.random() * 9) + 2; 
            const b = Math.floor(Math.random() * 9) + 2;
            const prod = a * b;

            if (Math.random() > 0.5) {
                currentMode = 'product';
                questionElement.innerHTML = `${a} × ${b}`;
                currentCorrectAnswers = [prod.toString()];
            } else {
                currentMode = 'factors';
                questionElement.innerHTML = prod.toString();
                currentCorrectAnswers = [];
                for(let i = 2; i <= 10; i++) {
                    for(let j = 2; j <= 10; j++) {
                        if (i * j === prod) {
                            currentCorrectAnswers.push(`${i} × ${j}`);
                        }
                    }
                }
            }
        }

        function createFish(forceCorrectAnswer = false) {
            const fish = document.createElement('div');
            const isSwimmingRight = Math.random() > 0.5;
            fish.className = `fish ${isSwimmingRight ? 'swimming-right' : 'swimming-left'}`;
            const fishEmoji = fishEmojis[Math.floor(Math.random() * fishEmojis.length)];
            
            let fishValue;
            if (forceCorrectAnswer) {
                fishValue = currentCorrectAnswers[Math.floor(Math.random() * currentCorrectAnswers.length)];
            } else {
                if (Math.random() < 0.35) { // Увеличен шанс за правилен отговор
                    fishValue = currentCorrectAnswers[Math.floor(Math.random() * currentCorrectAnswers.length)];
                } else {
                    if (currentMode === 'product') {
                        let wrongProd = parseInt(currentCorrectAnswers[0]);
                        while (currentCorrectAnswers.includes(wrongProd.toString())) {
                            let wa = Math.floor(Math.random() * 9) + 2;
                            let wb = Math.floor(Math.random() * 9) + 2;
                            wrongProd = wa * wb;
                            if (Math.random() > 0.5) wrongProd = parseInt(currentCorrectAnswers[0]) + (Math.floor(Math.random() * 5) - 2) * 2;
                            if (wrongProd <= 0) wrongProd = 4; 
                        }
                        fishValue = wrongProd.toString();
                    } else {
                        let wrongStr = currentCorrectAnswers[0];
                        while (currentCorrectAnswers.includes(wrongStr)) {
                            let wa = Math.floor(Math.random() * 9) + 2;
                            let wb = Math.floor(Math.random() * 9) + 2;
                            wrongStr = `${wa} × ${wb}`;
                        }
                        fishValue = wrongStr;
                    }
                }
            }

            fish.innerHTML = `
                <div class="fish-body">${fishEmoji}</div>
                <div class="fish-value">${fishValue}</div>
            `;

            const topPos = 5 + Math.random() * 65; 
            fish.style.top = `${topPos}%`;

            const duration = fishSpeedConfig.minDuration + Math.random() * (fishSpeedConfig.maxDuration - fishSpeedConfig.minDuration); 
            const travelPadding = Math.max(150, Math.min(260, window.innerWidth * 0.32));
            const startX = isSwimmingRight ? -travelPadding : window.innerWidth + travelPadding / 2;
            const endX = isSwimmingRight ? window.innerWidth + travelPadding / 2 : -travelPadding;
            
            const animation = fish.animate([
                { transform: `translateX(${startX}px)` },
                { transform: `translateX(${endX}px)` }
            ], {
                duration: duration * 1000,
                iterations: 1,
                easing: 'linear'
            });

            fish.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                catchFish(fish, fishValue, animation);
            });

            animation.onfinish = () => {
                if (waterElement.contains(fish)) waterElement.removeChild(fish);
            };

            waterElement.appendChild(fish);
            return fish;
        }

        function catchFish(fishElement, value, animation) {
            if (isGameOver || fishElement.dataset.caught === 'true') return;
            fishElement.dataset.caught = 'true';

            animation.pause();
            
            // Визуален ефект на самата рибка (дърпане)
            fishElement.style.transform = `${fishElement.style.transform} translateY(-30px) scale(1.3) rotate(25deg)`;
            fishElement.style.transition = 'transform 0.2s, opacity 0.2s';
            fishElement.style.opacity = '0';

            // Движение на въдицата
            rodEl.classList.add('catching');
            setTimeout(() => rodEl.classList.remove('catching'), 200);
            
            setTimeout(() => {
                if (waterElement.contains(fishElement)) waterElement.removeChild(fishElement);
            }, 200);

            if (currentCorrectAnswers.includes(value)) {
                updateScore(10);
                correctAnswers++;
                updateStats();
                animateStatElement('correct-count', '#4CAF50');
                reactFisherman('happy'); // Рибарят се радва
                
                generateNewQuestion();
                setTimeout(() => createFish(true), 400); 

            } else {
                updateScore(-5);
                incorrectAnswers++;
                updateStats();
                animateStatElement('incorrect-count', '#F44336');
                reactFisherman('sad'); // Рибарят се разочарова
            }
        }

        function animateStatElement(elementId, color) {
            const el = document.getElementById(elementId);
            el.style.transform = 'scale(1.8)';
            el.style.color = color;
            setTimeout(() => {
                el.style.transform = 'scale(1)';
                el.style.color = ''; 
            }, 300);
        }

        function spawnInitialFishes() {
            for (let i = 0; i < maxFishesOnScreen; i++) {
                setTimeout(() => createFish(i === 0), i * 600);
            }
        }

        function checkAndSpawnFishes() {
            if (waterElement.children.length < maxFishesOnScreen && !isGameOver) {
                createFish();
            }
        }

        function updateScore(points) {
            score += points;
            scoreElement.innerText = score;
            scoreElement.style.color = points > 0 ? '#4CAF50' : (points < 0 ? '#F44336' : '#333');
            scoreElement.style.transform = 'scale(1.6)';
            setTimeout(() => {
                scoreElement.style.transform = 'scale(1)';
                scoreElement.style.color = '#333';
            }, 300);
        }

        function showMessage(title, textHtml) {
            const overlay = document.getElementById('message-overlay');
            document.getElementById('message-title').innerText = title;
            document.getElementById('message-text').innerHTML = textHtml;
            overlay.classList.add('active');
        }

        function closeMessage() {
            document.getElementById('message-overlay').classList.remove('active');
        }

        window.resetGame = function() {
             initGame();
        };


        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                applyResponsiveGameSettings();
                restartSpawnInterval();
            }, 180);
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                applyResponsiveGameSettings();
                restartSpawnInterval();
            }, 250);
        });

        window.onload = function() {
            initGame();
        };

    </script>
</body>
</html>
